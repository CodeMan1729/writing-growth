<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Souls · 数学魂</title>
<link rel="stylesheet" href="../katex.min.css">
<script src="../three.min.js"></script>
<script src="../katex.min.js"></script><style>
:root {
  --bg-void:#0f0f28; --bg-deep:#141430; --surface:#1e1e3a; --surface2:#272748;
  --border:#454570; --border-bright:#7070b0;
  --algebra:#A855F7; --calculus:#FBBF24; --analysis:#10B981;
  --gold:#FFD700; --gold-dim:#c8960b; --red:#FF4466; --green:#00FF99;
  --text:#F4F6FF; --text-dim:#aabbd0; --text-muted:#667788;
  --font-title:'Cinzel',serif; --font-body:'Noto Serif SC',serif; --font-mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg-void);color:var(--text);font-family:var(--font-body);overflow:hidden;width:100vw;height:100vh;user-select:none}
#gameCanvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%}
/* HUD TOP */
#hud{position:fixed;top:0;left:0;right:0;height:58px;display:flex;align-items:center;padding:0 18px;gap:14px;background:linear-gradient(to bottom,rgba(5,5,8,.95),transparent);z-index:100;pointer-events:none}
.hud-title{font-family:var(--font-title);font-size:1.15rem;letter-spacing:.15em;background:linear-gradient(135deg,var(--gold),#FF8C42);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
.hud-sep{width:1px;height:22px;background:var(--border)}
.hud-stat{display:flex;flex-direction:column;align-items:center;gap:1px;min-width:52px}
.hud-stat .val{font-family:var(--font-title);font-size:.95rem;color:var(--gold);line-height:1}
.hud-stat .lbl{font-family:var(--font-mono);font-size:.48rem;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase}
.hud-xp-wrap{flex:1;display:flex;flex-direction:column;gap:3px;max-width:190px}
.hud-xp-label{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:.55rem;color:var(--text-dim)}
.hud-xp-bar{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden}
.hud-xp-fill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:2px;transition:width .6s ease;width:0%}
.hud-area{margin-left:auto;font-family:var(--font-mono);font-size:.65rem;color:var(--text-dim);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 11px}
.hud-btn{pointer-events:all;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text-dim);font-family:var(--font-mono);font-size:.62rem;padding:6px 11px;cursor:pointer;letter-spacing:.06em;transition:all .2s}
.hud-btn:hover{border-color:var(--gold);color:var(--gold)}

/* INTERACT PROMPT */
#interact-prompt{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(10,10,18,.92);border:1px solid var(--gold);border-radius:8px;padding:10px 20px;font-family:var(--font-mono);font-size:.8rem;color:var(--gold);letter-spacing:.1em;pointer-events:none;z-index:200;opacity:0;transition:opacity .2s;display:flex;align-items:center;gap:10px;box-shadow:0 0 20px rgba(245,197,24,.3)}
#interact-prompt.show{opacity:1}
#interact-prompt .pname{color:var(--text);font-size:.7rem}

/* HUD BOTTOM */
#hud-bottom{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:18px;font-family:var(--font-mono);font-size:.6rem;color:var(--text-muted);pointer-events:none;z-index:100}
.kbd{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 5px;color:var(--text-dim)}

/* NOTIFICATIONS */
#notif-container{position:fixed;top:68px;right:18px;z-index:300;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.notif{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 15px;font-family:var(--font-mono);font-size:.7rem;color:var(--text);animation:nIn .3s ease,nOut .3s ease 2.7s forwards;max-width:270px}
.notif.gold{border-color:var(--gold);color:var(--gold)}
.notif.green{border-color:var(--green);color:var(--green)}
.notif.red{border-color:var(--red);color:var(--red)}
@keyframes nIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes nOut{from{opacity:1}to{opacity:0;transform:translateX(20px)}}

/* MINIMAP */
#minimap{position:fixed;bottom:48px;right:18px;width:130px;height:130px;background:rgba(5,5,8,.85);border:1px solid var(--border);border-radius:8px;z-index:100;overflow:hidden}
#minimap canvas{width:100%;height:100%}

/* BATTLE OVERLAY */
#battle-overlay{position:fixed;inset:0;background:rgba(5,5,8,.97);z-index:500;display:none;flex-direction:column;opacity:0;transition:opacity .3s}
#battle-panel{display:flex;width:100%;height:100%;overflow:hidden}
#battle-left{width:285px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;padding:18px;gap:11px;overflow-y:auto;background:linear-gradient(180deg,var(--surface),var(--bg-deep))}
#monster-preview-canvas{width:100%;height:165px;border-radius:8px;border:1px solid var(--border);background:var(--bg-void)}
.b-name{font-family:var(--font-title);font-size:1rem;color:var(--text);letter-spacing:.05em}
.b-stars{font-size:.88rem;margin-top:2px}
.b-badge{display:inline-block;font-family:var(--font-mono);font-size:.58rem;letter-spacing:.1em;padding:3px 9px;border-radius:20px;margin-top:4px}
.badge-algebra{background:rgba(139,92,246,.2);color:#C4B5FD;border:1px solid rgba(139,92,246,.4)}
.badge-calculus{background:rgba(245,158,11,.2);color:#FCD34D;border:1px solid rgba(245,158,11,.4)}
.badge-analysis{background:rgba(16,185,129,.2);color:#6EE7B7;border:1px solid rgba(16,185,129,.4)}
.b-lore{font-size:.76rem;color:var(--text-dim);line-height:1.7;font-style:italic;border-left:2px solid var(--border-bright);padding-left:9px}
.b-status{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:.64rem;padding:5px 11px;border-radius:20px;letter-spacing:.08em}
.chip-unseen{background:rgba(100,116,139,.2);color:var(--text-dim);border:1px solid var(--border)}
.chip-battle{background:rgba(245,197,24,.15);color:var(--gold);border:1px solid rgba(245,197,24,.4);animation:pulse 1.5s ease infinite}
.chip-killed{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.4)}
.chip-cursed{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.4)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.b-tags{display:flex;flex-wrap:wrap;gap:4px}
.b-tag{font-family:var(--font-mono);font-size:.56rem;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 6px;color:var(--text-dim)}
.b-close{margin-top:auto;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--text-dim);font-family:var(--font-mono);font-size:.7rem;padding:9px;cursor:pointer;letter-spacing:.1em;transition:all .2s;pointer-events:all;text-align:center}
.b-close:hover{border-color:var(--red);color:var(--red)}
#battle-right{flex:1;display:flex;flex-direction:column;overflow:hidden}
#battle-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 18px;flex-shrink:0;pointer-events:all}
.b-tab{font-family:var(--font-mono);font-size:.68rem;letter-spacing:.08em;color:var(--text-dim);padding:13px 13px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none}
.b-tab:hover{color:var(--text)}
.b-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
#battle-content{flex:1;overflow-y:auto;padding:18px;pointer-events:all}
#battle-content::-webkit-scrollbar{width:3px}
#battle-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.prob-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:22px;font-size:1rem;line-height:1.9;min-height:70px;margin-bottom:12px}
.prob-ctx{font-family:var(--font-mono);font-size:.65rem;color:var(--text-dim);margin-bottom:14px}
.section-title{font-family:var(--font-mono);font-size:.62rem;letter-spacing:.12em;color:var(--text-dim);text-transform:uppercase;margin-bottom:7px;margin-top:14px}
.hint-item{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:5px}
.hint-hd{display:flex;align-items:center;justify-content:space-between;padding:8px 13px;cursor:pointer;font-family:var(--font-mono);font-size:.7rem;color:var(--text-dim);transition:color .2s;pointer-events:all}
.hint-hd:hover{color:var(--gold)}
.hint-bd{display:none;padding:9px 13px;border-top:1px solid var(--border);font-size:.82rem;color:var(--text);line-height:1.7}
.hint-bd.open{display:block}
.log-entry{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:14px;margin-bottom:10px}
.log-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.log-num{font-family:var(--font-title);font-size:.65rem;color:var(--text-dim);letter-spacing:.1em}
.log-date{font-family:var(--font-mono);font-size:.6rem;color:var(--text-muted)}
.log-fl{font-family:var(--font-mono);font-size:.58rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.log-fv{font-size:.8rem;color:var(--text);line-height:1.6;margin-bottom:9px}
.log-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px}
.log-chip{font-family:var(--font-mono);font-size:.6rem;background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.3);border-radius:4px;padding:2px 6px;color:#C4B5FD}
.killed-banner{background:linear-gradient(135deg,rgba(34,197,94,.1),rgba(34,197,94,.05));border:1px solid rgba(34,197,94,.3);border-radius:9px;padding:14px;margin-bottom:10px}
.kb-title{font-family:var(--font-title);font-size:.88rem;color:var(--green);margin-bottom:5px}
.kb-method{font-family:var(--font-mono);font-size:.62rem;color:var(--text-dim);margin-bottom:7px}
.kb-story{font-size:.8rem;color:var(--text);line-height:1.6;font-style:italic}
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<!-- HUD TOP -->
<div id="hud">
  <div class="hud-title">MATH SOULS</div>
  <div class="hud-sep"></div>
  <div class="hud-stat">
    <span class="val" id="hud-level">Lv.1</span>
    <span class="lbl">等级</span>
  </div>
  <div class="hud-stat">
    <span class="val" id="hud-killed">0</span>
    <span class="lbl">击杀</span>
  </div>
  <div class="hud-xp-wrap">
    <div class="hud-xp-label">
      <span id="hud-title-text">迷途的学者</span>
      <span><span id="hud-xp-cur">0</span>/<span id="hud-xp-need">500</span></span>
    </div>
    <div class="hud-xp-bar"><div class="hud-xp-fill" id="hud-xp-fill"></div></div>
  </div>
  <div class="hud-area" id="hud-area">虚空</div>
  <button class="hud-btn" onclick="UI.showCreateMonster()">⚔ 召唤怪物</button>
  <button class="hud-btn" onclick="UI.showWeaponLibrary()">📖 武器库</button>
  <button class="hud-btn" onclick="UI.exportData()">💾 导出</button>
  <button class="hud-btn" onclick="UI.importData()">📂 导入</button>
</div>

<!-- INTERACT PROMPT -->
<div id="interact-prompt">
  <span>[E]</span>
  <span>挑战</span>
  <span class="pname"></span>
</div>

<!-- HUD BOTTOM -->
<div id="hud-bottom">
  <span><span class="kbd">W</span><span class="kbd">A</span><span class="kbd">S</span><span class="kbd">D</span> 移动</span>
  <span><span class="kbd">E</span> 交互</span>
  <span><span class="kbd">ESC</span> 关闭</span>
</div>

<!-- MINIMAP -->
<div id="minimap"><canvas id="minimap-canvas" width="130" height="130"></canvas></div>

<!-- NOTIFICATIONS -->
<div id="notif-container"></div>

<!-- BATTLE OVERLAY -->
<div id="battle-overlay">
  <div id="battle-panel">
    <div id="battle-left">
      <canvas id="monster-preview-canvas"></canvas>
      <div id="b-name" class="b-name">怪物名称</div>
      <div id="b-stars" class="b-stars"></div>
      <div id="b-domain" class="b-badge badge-algebra"></div>
      <div id="b-lore" class="b-lore"></div>
      <div id="b-status" class="b-status chip-unseen">◎ 未曾交手</div>
      <div id="b-tags" class="b-tags"></div>
      <button class="b-close" onclick="UI.closeBattle()">ESC · 撤退</button>
    </div>
    <div id="battle-right">
      <div id="battle-tabs">
        <button class="b-tab active" data-tab="problem" onclick="UI._switchTab('problem')">题目</button>
        <button class="b-tab" data-tab="log" onclick="UI._switchTab('log')">战斗日志</button>
        <button class="b-tab" data-tab="weapons" onclick="UI._switchTab('weapons')">武器</button>
      </div>
      <div id="battle-content"></div>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="game.js"></script>
<script src="ui.js"></script>
<script>
  // 初始化 — 不做任何覆盖，ui.js 内部逻辑已完整
  window.addEventListener('DOMContentLoaded', function(){
    var canvas = document.getElementById('gameCanvas');
    Game.init(canvas, function(monsterId){ UI.openBattle(monsterId); });
    UI.updateHUD();
    UI.notify('欢迎来到 Math Souls', 'gold');
    UI.notify('WASD移动，靠近怪物按E交互', '');
  });

  // ESC 键关闭战斗面板
  window.addEventListener('keydown', function(e){
    if(e.code === 'Escape'){
      var overlay = document.getElementById('battle-overlay');
      if(overlay && overlay.style.display !== 'none'){
        UI.closeBattle();
      }
    }
  });
</script>
</body>
</html>
