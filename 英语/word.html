<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>单词老虎机 · Word Slots</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Serif+SC:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/*
=================================================================
  【录入单词方法】
  在 JS 区域找到 const WORD_BANK = [...] 按格式添加对象。

  单选题（options 中恰好 1 个 correct:true，共 3 项）：
  {
    word:     "ephemeral",
    pos:      "adj.",
    sentence: "The ephemeral beauty of cherry blossoms makes them precious.",
    options: [
      { text: "短暂的，瞬息的", correct: true  },
      { text: "永恒的",         correct: false },
      { text: "显著的",         correct: false }
    ]
  }

  多选题（options 中 2+ 个 correct:true，共 5 项）：
  {
    word:     "meticulous",
    pos:      "adj.",
    sentence: "She was meticulous in her research.",
    options: [
      { text: "一丝不苟的",   correct: true  },
      { text: "非常细致的",   correct: true  },
      { text: "粗心大意的",   correct: false },
      { text: "迅速果断的",   correct: false },
      { text: "固执己见的",   correct: false }
    ]
  }

  规则：
  - 单选 3 个选项，恰好 1 个 correct:true
  - 多选 5 个选项，2~4 个 correct:true
  - 多选题多答、少答、错答均不得分且扣分

  【积分 & 连击】
  答对+10 | combo×2→+20 | combo×3→+30 | combo≥4→+40
  暴击(~15%)→当轮×2  |  答错→-(5×min(combo,4))，积分≥0，连击清零

  【段位】0新芽 100学徒 300学者 700达人 1500大师 3000传说

  【持久化】localStorage，key前缀"wordslots_"
  清除：浏览器控制台执行 localStorage.clear()
=================================================================
*/
:root{
  --bg:#0d0d0f;--surface:#16161a;--surface2:#1e1e24;--border:#2a2a35;
  --accent:#f5c518;--accent2:#e05c2a;--correct:#3ddc84;--wrong:#ff4d6d;
  --text:#e8e8f0;--text-dim:#7a7a9a;--combo:#a78bfa;--crit:#ffd700;
  --font-display:'Bebas Neue',cursive;--font-body:'Noto Serif SC',serif;
  --font-mono:'Space Mono',monospace;--radius:12px;
  --shadow:0 8px 32px rgba(0,0,0,0.6);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);color:var(--text);font-family:var(--font-body);
  min-height:100vh;overflow-x:hidden;
  background-image:
    radial-gradient(ellipse at 20% 0%,rgba(245,197,24,0.07) 0%,transparent 55%),
    radial-gradient(ellipse at 80% 100%,rgba(224,92,42,0.07) 0%,transparent 55%);
}
.app{max-width:860px;margin:0 auto;padding:24px 16px 80px}

/* Header */
.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;gap:12px;flex-wrap:wrap}
.title{
  font-family:var(--font-display);font-size:3rem;letter-spacing:0.08em;
  background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1
}
.title .sub{
  font-size:0.9rem;font-family:var(--font-mono);-webkit-text-fill-color:var(--text-dim);
  display:block;letter-spacing:0.22em;margin-top:4px
}
.status-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding-top:4px}
.stat-box{
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:8px 14px;text-align:center;min-width:70px
}
.stat-box .val{font-family:var(--font-display);font-size:1.6rem;color:var(--accent);display:block;line-height:1}
.stat-box .lbl{font-size:0.6rem;color:var(--text-dim);letter-spacing:0.12em;text-transform:uppercase;margin-top:2px;display:block}
.rank-badge{background:var(--surface);border:1px solid var(--accent);border-radius:20px;padding:7px 16px;font-size:0.88rem;color:var(--accent);white-space:nowrap}
.best-badge{background:var(--surface);border:1px solid var(--combo);border-radius:20px;padding:7px 14px;font-size:0.78rem;color:var(--combo);white-space:nowrap;font-family:var(--font-mono)}

/* Combo */
.combo-display{text-align:center;height:52px;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.combo-text{
  font-family:var(--font-display);font-size:2.4rem;color:var(--combo);letter-spacing:0.14em;
  opacity:0;transform:scale(0.7);transition:opacity 0.25s,transform 0.25s;
  text-shadow:0 0 24px rgba(167,139,250,0.7);pointer-events:none
}
.combo-text.show{opacity:1;transform:scale(1)}
.combo-text.bounce{animation:comboBounce 0.35s ease}
@keyframes comboBounce{0%{transform:scale(1)}40%{transform:scale(1.5)}70%{transform:scale(0.88)}100%{transform:scale(1)}}

/* Slot Machine */
.slot-machine{
  background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);
  padding:24px 24px 20px;margin-bottom:24px;box-shadow:var(--shadow);position:relative;overflow:hidden
}
.slot-machine::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(180deg,rgba(245,197,24,0.04) 0%,transparent 40%,transparent 60%,rgba(245,197,24,0.04) 100%)
}
.reels{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.reel-wrap{
  position:relative;height:88px;overflow:hidden;
  border-radius:8px;background:var(--bg);border:1px solid var(--border)
}
.reel-wrap::before,.reel-wrap::after{
  content:'';position:absolute;left:0;right:0;height:24px;z-index:2;pointer-events:none
}
.reel-wrap::before{top:0;background:linear-gradient(to bottom,var(--bg),transparent)}
.reel-wrap::after{bottom:0;background:linear-gradient(to top,var(--bg),transparent)}
.reel-line{
  position:absolute;top:50%;left:8px;right:8px;height:2px;background:var(--accent);
  opacity:0.25;transform:translateY(-50%);z-index:3;pointer-events:none
}
.reel{position:absolute;left:0;right:0;top:0;display:flex;flex-direction:column}
.reel-item{
  height:88px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-size:1.15rem;letter-spacing:0.05em;
  color:var(--text);padding:0 6px;text-align:center;text-transform:lowercase
}
.reel-item.chosen{color:var(--accent);text-shadow:0 0 18px rgba(245,197,24,0.6)}
@keyframes reelScroll{0%{transform:translateY(0)}100%{transform:translateY(calc(-88px * 6))}}
.reel.spinning{animation:reelScroll 0.32s linear infinite}

.spin-btn{
  display:block;width:100%;padding:15px;
  background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);
  color:#0d0d0f;font-family:var(--font-display);font-size:1.9rem;letter-spacing:0.2em;
  border:none;border-radius:8px;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;
  box-shadow:0 4px 22px rgba(245,197,24,0.4);position:relative;overflow:hidden
}
.spin-btn::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(180deg,rgba(255,255,255,0.15) 0%,transparent 60%)
}
.spin-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 30px rgba(245,197,24,0.55)}
.spin-btn:active:not(:disabled){transform:translateY(1px);box-shadow:0 2px 10px rgba(245,197,24,0.3)}
.spin-btn:disabled{opacity:0.4;cursor:not-allowed}

/* Question Cards */
.questions-area{display:flex;flex-direction:column;gap:16px}
.q-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:22px 24px;box-shadow:var(--shadow);opacity:0;transform:translateY(16px);
  animation:cardIn 0.4s ease forwards;transition:border-color 0.3s
}
@keyframes cardIn{to{opacity:1;transform:translateY(0)}}
.q-card:nth-child(1){animation-delay:0.05s}
.q-card:nth-child(2){animation-delay:0.2s}
.q-card:nth-child(3){animation-delay:0.35s}
.q-card.answered-correct{border-color:rgba(61,220,132,0.5)}
.q-card.answered-wrong{border-color:rgba(255,77,109,0.5)}

.q-type-badge{
  display:inline-block;font-size:0.63rem;font-family:var(--font-mono);
  letter-spacing:0.12em;text-transform:uppercase;padding:3px 9px;border-radius:4px;
  margin-bottom:12px;background:var(--surface2);color:var(--text-dim);border:1px solid var(--border)
}
.q-type-badge.multi{color:var(--combo);border-color:var(--combo);background:rgba(167,139,250,0.1)}

.q-word{font-family:var(--font-mono);font-size:1.5rem;color:var(--accent);letter-spacing:0.06em;display:block;margin-bottom:2px;text-transform:lowercase}
.q-pos{font-family:var(--font-mono);font-size:0.75rem;color:var(--text-dim);margin-bottom:14px;display:block}
.q-prompt{font-size:1rem;line-height:1.7;margin-bottom:14px;color:var(--text)}
.q-sentence{
  font-style:italic;color:var(--text-dim);font-size:0.95rem;line-height:1.7;
  margin-bottom:14px;padding:10px 14px;
  border-left:3px solid var(--accent);opacity:0.85;
  background:var(--surface2);border-radius:0 6px 6px 0
}
.q-sentence .hl{color:var(--accent);font-style:normal;font-weight:700;text-decoration:underline;text-decoration-color:rgba(245,197,24,0.4)}

/* 自测模式 */
.self-test-word{font-family:var(--font-mono);font-size:2.2rem;color:var(--accent);letter-spacing:0.08em;display:block;margin-bottom:4px;text-transform:lowercase;text-align:center;padding:18px 0 6px}
.self-test-pos{font-family:var(--font-mono);font-size:0.8rem;color:var(--text-dim);display:block;text-align:center;margin-bottom:20px}
.self-test-hint{text-align:center;font-size:0.85rem;color:var(--text-dim);font-family:var(--font-mono);margin-bottom:12px;letter-spacing:0.06em}
.reveal-mask{
  position:relative;border-radius:8px;overflow:hidden;
  background:var(--surface2);border:1px dashed var(--border);
  padding:18px 24px;margin-bottom:18px;cursor:pointer;
  transition:border-color 0.2s;
  user-select:none;
}
.reveal-mask:hover{border-color:var(--accent)}
.reveal-mask .mask-cover{
  position:absolute;inset:0;background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  border-radius:8px;transition:opacity 0.35s;
  font-family:var(--font-mono);font-size:0.82rem;
  color:var(--text-dim);letter-spacing:0.1em;
  backdrop-filter:blur(2px);
}
.reveal-mask .mask-cover.hidden{opacity:0;pointer-events:none}
.reveal-mask .meaning-content{
  font-size:1.05rem;line-height:1.8;color:var(--text);
  opacity:0;transition:opacity 0.35s;
}
.reveal-mask .meaning-content.visible{opacity:1}
.meaning-item{display:flex;align-items:baseline;gap:8px;padding:2px 0}
.meaning-item .m-label{font-family:var(--font-mono);font-size:0.72rem;color:var(--correct);min-width:14px}
.self-judge-btns{display:flex;gap:12px;margin-top:4px}
.self-judge-btns button{
  flex:1;padding:11px 0;border:none;border-radius:8px;
  font-family:var(--font-display);font-size:1.3rem;letter-spacing:0.15em;
  cursor:pointer;transition:transform 0.12s,opacity 0.12s;
  opacity:0;pointer-events:none;transition:opacity 0.3s,transform 0.12s;
}
.self-judge-btns button.active{opacity:1;pointer-events:auto}
.self-judge-btns .btn-correct-self{background:var(--correct);color:#0d0d0f}
.self-judge-btns .btn-wrong-self{background:var(--wrong);color:#fff}
.self-judge-btns button:hover{transform:translateY(-2px)}
.self-judge-btns button:active{transform:translateY(1px)}

.options{display:flex;flex-direction:column;gap:8px}
.option-btn{
  width:100%;text-align:left;padding:11px 16px;
  background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  color:var(--text);font-family:var(--font-body);font-size:0.95rem;
  cursor:pointer;transition:border-color 0.15s,background 0.15s,transform 0.1s;
  display:flex;align-items:center;gap:10px
}
.option-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(245,197,24,0.07);transform:translateX(3px)}
.option-btn .opt-label{font-family:var(--font-mono);font-size:0.78rem;color:var(--text-dim);min-width:18px;flex-shrink:0}
.option-btn.selected{border-color:var(--accent);background:rgba(245,197,24,0.1)}
.option-btn.correct{border-color:var(--correct)!important;background:rgba(61,220,132,0.12)!important;color:var(--correct)!important}
.option-btn.wrong{border-color:var(--wrong)!important;background:rgba(255,77,109,0.12)!important;color:var(--wrong)!important}
.option-btn:disabled{cursor:default;transform:none!important}

.submit-multi{
  margin-top:12px;padding:10px 24px;background:var(--combo);color:#fff;
  font-family:var(--font-mono);font-size:0.85rem;border:none;border-radius:8px;
  cursor:pointer;letter-spacing:0.08em;transition:opacity 0.15s,transform 0.15s
}
.submit-multi:hover{opacity:0.85;transform:translateY(-1px)}
.submit-multi:disabled{opacity:0.35;cursor:default;transform:none}

.q-result{
  margin-top:12px;padding:10px 14px;border-radius:8px;font-size:0.88rem;
  display:none;align-items:center;gap:8px;font-family:var(--font-mono)
}
.q-result.show{display:flex}
.q-result.correct-fb{background:rgba(61,220,132,0.1);border:1px solid var(--correct);color:var(--correct)}
.q-result.wrong-fb{background:rgba(255,77,109,0.08);border:1px solid var(--wrong);color:var(--wrong)}
.q-result .score-delta{font-family:var(--font-display);font-size:1.4rem;margin-left:auto}

/* Flash overlay */
.flash-overlay{position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:0}
.flash-overlay.correct-flash{
  background:radial-gradient(ellipse at center,rgba(61,220,132,0.28) 0%,transparent 70%);
  animation:flashAnim 0.7s ease forwards
}
.flash-overlay.wrong-flash{
  background:radial-gradient(ellipse at center,rgba(255,77,109,0.25) 0%,transparent 70%);
  animation:flashAnim 0.55s ease forwards
}
.flash-overlay.crit-flash{
  background:radial-gradient(ellipse at center,rgba(255,215,0,0.38) 0%,transparent 65%);
  animation:flashAnim 1s ease forwards
}
@keyframes flashAnim{0%{opacity:0}15%{opacity:1}100%{opacity:0}}

@keyframes shake{
  0%,100%{transform:translateX(0)}
  15%{transform:translateX(-9px)}
  30%{transform:translateX(9px)}
  45%{transform:translateX(-7px)}
  60%{transform:translateX(7px)}
  75%{transform:translateX(-4px)}
  90%{transform:translateX(4px)}
}
.shake{animation:shake 0.5s ease}

.crit-label{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.4);
  font-family:var(--font-display);font-size:5rem;color:var(--crit);
  text-shadow:0 0 40px rgba(255,215,0,0.9),0 0 80px rgba(255,215,0,0.5);
  letter-spacing:0.15em;pointer-events:none;z-index:10000;
  opacity:0;animation:critPop 1.1s ease forwards
}
@keyframes critPop{
  0%{opacity:0;transform:translate(-50%,-50%) scale(0.3)}
  20%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}
  45%{transform:translate(-50%,-50%) scale(0.95)}
  65%{opacity:1;transform:translate(-50%,-50%) scale(1)}
  100%{opacity:0;transform:translate(-50%,-62%) scale(1.05)}
}

.score-popup{
  position:fixed;pointer-events:none;z-index:9998;
  font-family:var(--font-display);font-size:2.2rem;
  animation:scoreFloat 1.3s ease forwards
}
@keyframes scoreFloat{
  0%{opacity:1;transform:translateY(0) translateX(-50%)}
  100%{opacity:0;transform:translateY(-70px) translateX(-50%)}
}

.today-bar{
  display:flex;gap:8px;align-items:center;justify-content:center;
  margin-bottom:20px;font-family:var(--font-mono);font-size:0.78rem;color:var(--text-dim)
}
.today-bar span{color:var(--text)}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="title">WORD SLOTS<span class="sub">VOCABULARY MACHINE</span></div>
    <div class="status-bar">
      <div class="stat-box"><span class="val" id="scoreVal">0</span><span class="lbl">Score</span></div>
      <div class="stat-box"><span class="val" id="comboVal">0</span><span class="lbl">Combo</span></div>
      <div id="rankBadge" class="rank-badge">🌱 新芽</div>
      <div class="best-badge">最高连击 <span id="bestComboVal">0</span></div>
    </div>
  </div>

  <div class="today-bar">
    今日答题 <span id="todayTotal">0</span> 题 · 正确 <span id="todayCorrect">0</span> 题 · 正确率 <span id="todayRate">-</span>
  </div>

  <div class="combo-display"><div class="combo-text" id="comboText">COMBO ×1</div></div>

  <div class="slot-machine">
    <div class="reels">
      <div class="reel-wrap"><div class="reel-line"></div><div class="reel" id="reel0"></div></div>
      <div class="reel-wrap"><div class="reel-line"></div><div class="reel" id="reel1"></div></div>
      <div class="reel-wrap"><div class="reel-line"></div><div class="reel" id="reel2"></div></div>
    </div>
    <button class="spin-btn" id="spinBtn" onclick="spin()">SPIN</button>
  </div>

  <div class="questions-area" id="questionsArea"></div>
</div>

<div class="flash-overlay" id="flashOverlay"></div>

<script>
// =================================================================
// 【单词库】在这里添加你的单词（2026.3.17版本）
// 单选：options 共3项，恰好1个 correct:true
// 多选：options 共5项，2~4个 correct:true
// =================================================================
const WORD_BANK = [
  {
    word: "only if",
    pos: "conj. phrase",
    sentence: "Although countless aspiring authors dream of instant fame upon completing their first draft, true literary success comes only if they embrace rigorous self-editing and seek constructive criticism from mentors, principles that Stephen King passionately advocates in his renowned writing course materials.",
    options: [
      { text: "如果……就……（只有在……条件下才）", correct: true  },
      { text: "即使……也……",                     correct: false },
      { text: "不但……而且……",                   correct: false }
    ]
  },
  {
    word: "permit",
    pos: "v./n.",
    sentence: "The publishing house’s strict editorial guidelines do not permit any participant in the workshop to submit a manuscript without first undergoing multiple rounds of peer review, a process that often uncovers subtle inconsistencies in plot and character motivation which could otherwise derail an otherwise promising narrative arc.",
    options: [
      { text: "允许；许可",   correct: true  },
      { text: "许可证；许可", correct: true  },
      { text: "拒绝；阻止",   correct: false },
      { text: "惩罚；制裁",   correct: false },
      { text: "夸耀；炫耀",   correct: false }
    ]
  },
  {
    word: "clip",
    pos: "v./n.",
    sentence: "In the age of digital research, experienced nonfiction writers often clip the most pertinent paragraphs from lengthy online articles and weave them into their own drafts with seamless transitions, yet they must always verify sources meticulously to avoid any ethical lapses that might undermine the credibility of their entire body of work.",
    options: [
      { text: "剪辑；修剪；快速移动", correct: true  },
      { text: "片段；剪报；夹子",     correct: true  },
      { text: "长期拖延",             correct: false },
      { text: "大声朗读",             correct: false },
      { text: "完全忽略",             correct: false }
    ]
  },
  {
    word: "printout",
    pos: "n.",
    sentence: "After hours of staring at a glowing screen filled with tracked changes and comments, the meticulous novelist always requests a fresh printout of the revised chapters so that she can mark up awkward phrasing and abrupt transitions with a red pen, revealing flaws in pacing that digital tools alone fail to highlight.",
    options: [
      { text: "打印件",     correct: true  },
      { text: "手写草稿",   correct: false },
      { text: "语音记录",   correct: false }
    ]
  },
  {
    word: "chauvinistic",
    pos: "adj.",
    sentence: "Modern literary critics frequently observe that several classic adventure novels from the early twentieth century display a chauvinistic attitude toward female supporting characters, which contemporary authors are now deliberately revising through more balanced portrayals that enhance thematic depth and appeal to a broader, more inclusive global readership.",
    options: [
      { text: "大男子主义的；盲目偏执的", correct: true  },
      { text: "平等包容的",               correct: false },
      { text: "谦逊克制的",               correct: false }
    ]
  },
  {
    word: "drop a paragraph",
    pos: "v. phrase",
    sentence: "During the intensive revision stage recommended by writing masters, it sometimes becomes essential to drop a paragraph that, although rich in descriptive detail, fails to advance the central conflict or deepen character relationships, thereby tightening the overall structure and preventing the story from losing momentum in the eyes of impatient readers.",
    options: [
      { text: "删除一段；省略一段（编辑语境）", correct: true  },
      { text: "扩写一段并添加细节",             correct: false },
      { text: "逐字背诵整段内容",               correct: false }
    ]
  },
  {
    word: "abrupt transition",
    pos: "n. phrase",
    sentence: "One of the most common pitfalls faced by novice storytellers is an abrupt transition between major scenes that leaves readers momentarily disoriented and breaks the immersive flow, a flaw that can be elegantly corrected by inserting subtle foreshadowing phrases as advised in advanced creative writing courses focused on narrative continuity.",
    options: [

let audioCtx=null;
function getAudio(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq,type,dur,vol,freqEnd){
  try{
    const ctx=getAudio(),osc=ctx.createOscillator(),g=ctx.createGain();
    osc.connect(g);g.connect(ctx.destination);
    osc.type=type;
    osc.frequency.setValueAtTime(freq,ctx.currentTime);
    if(freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd,ctx.currentTime+dur);
    g.gain.setValueAtTime(vol,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+dur);
  }catch(e){}
}
function soundCorrect(){
  playTone(440,'sine',0.12,0.3,660);
  setTimeout(()=>playTone(880,'sine',0.18,0.25),110);

}

// 机械枪械音效
let reelTickInterval=null;
let reelTickRunning=false;
function soundReelStart(){
  // 先确保上一次彻底停止
  reelTickRunning=false;
  reelTickInterval && clearTimeout(reelTickInterval);
  reelTickInterval=null;

  let tickCount=0;
  reelTickRunning=true;

  function tick(){
    if(!reelTickRunning) return;
    try{
      const ctx=getAudio();
      const bufSize=Math.floor(ctx.sampleRate*0.03);
      const buf=ctx.createBuffer(1,bufSize,ctx.sampleRate);
      const data=buf.getChannelData(0);
      for(let i=0;i<bufSize;i++) data[i]=(Math.random()*2-1);
      const src=ctx.createBufferSource();
      src.buffer=buf;
      const bpf=ctx.createBiquadFilter();
      bpf.type='bandpass';
      bpf.frequency.value=3500+Math.random()*800;
      bpf.Q.value=1.2;
      const g=ctx.createGain();
      src.connect(bpf);bpf.connect(g);g.connect(ctx.destination);
      g.gain.setValueAtTime(0.22,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.03);
      src.start(ctx.currentTime);src.stop(ctx.currentTime+0.03);
    }catch(e){}
    tickCount++;
    let interval;
    if(tickCount<6)       interval=42;
    else if(tickCount<15) interval=58;
    else if(tickCount<26) interval=85;
    else                  interval=125;
    reelTickInterval=setTimeout(tick, interval);
  }
  tick();
}
function soundReelStop(){
  // 彻底停止tick
  reelTickRunning=false;
  reelTickInterval && clearTimeout(reelTickInterval);
  reelTickInterval=null;
  try{
    const ctx=getAudio();
    const bufSize=Math.floor(ctx.sampleRate*0.08);
    const buf=ctx.createBuffer(1,bufSize,ctx.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<bufSize;i++){
      const env=Math.exp(-i/(bufSize*0.12));
      data[i]=(Math.random()*2-1)*env;
    }
    const src=ctx.createBufferSource();
    src.buffer=buf;
    const hpf=ctx.createBiquadFilter();
    hpf.type='highpass';
    hpf.frequency.value=1800;
    const g=ctx.createGain();
    src.connect(hpf);hpf.connect(g);g.connect(ctx.destination);
    g.gain.setValueAtTime(0.7,ctx.currentTime);
    src.start(ctx.currentTime);src.stop(ctx.currentTime+0.08);
    const osc=ctx.createOscillator();
    const og=ctx.createGain();
    osc.connect(og);og.connect(ctx.destination);
    osc.type='sine';
    osc.frequency.setValueAtTime(180,ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(60,ctx.currentTime+0.07);
    og.gain.setValueAtTime(0.4,ctx.currentTime);
    og.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.09);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.09);
    const osc2=ctx.createOscillator();
    const og2=ctx.createGain();
    osc2.connect(og2);og2.connect(ctx.destination);
    osc2.type='triangle';
    osc2.frequency.setValueAtTime(4200,ctx.currentTime);
    osc2.frequency.exponentialRampToValueAtTime(2000,ctx.currentTime+0.04);
    og2.gain.setValueAtTime(0.1,ctx.currentTime);
    og2.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.05);
    osc2.start(ctx.currentTime);osc2.stop(ctx.currentTime+0.05);
  }catch(e){}
}

// =================================================================
// 老虎机
// =================================================================
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function buildReel(reelEl,allWords,chosenWord){
  reelEl.innerHTML='';
  reelEl.style.transition='none';
  const others=allWords.filter(w=>w!==chosenWord);
  const pad=()=>others.length>0?others[Math.floor(Math.random()*others.length)]:chosenWord;
  const items=[pad(),pad(),pad(),chosenWord,pad(),pad(),pad()];
  items.forEach((w,i)=>{
    const d=document.createElement('div');
    d.className='reel-item'+(i===3?' chosen':'');
    d.textContent=w.word;
    reelEl.appendChild(d);
  });
  reelEl.style.transform='translateY(0)';
}
function spinReel(reelEl,stopDelay,cb){
  reelEl.style.transition='none';
  reelEl.style.transform='translateY(0)';
  reelEl.classList.add('spinning');
  setTimeout(()=>{
    reelEl.classList.remove('spinning');
    reelEl.style.transition='transform 0.55s cubic-bezier(0.17,0.67,0.35,1.3)';
    reelEl.style.transform='translateY(-264px)';
    soundReelStop();
    setTimeout(()=>{ if(cb)cb(); }, 600);
  },stopDelay);
}

function buildQuestion(wordObj){
  const correctCount=wordObj.options.filter(o=>o.correct).length;
  const isMulti=correctCount>1;
  // 随机决定题型：A=直接显示单词，B=显示例句，C=自测模式
  const r=Math.random();
  const type=r<0.34?'A':r<0.67?'B':'C';
  const opts=shuffle([...wordObj.options]);
  return {wordObj,type,opts,isMulti};
}

// 渲染题目
// =================================================================
function renderQuestion(q,qidx){
  const card=document.getElementById('qcard'+qidx);
  const labels=['A','B','C','D','E'];
  let html='';

  // 题型标签
  if(q.isMulti){
    html+='<span class="q-type-badge multi">多选题 — 选出所有正确项（多选/少选/错选均扣分）</span>';
  } else {
    html+='<span class="q-type-badge">单选题</span>';
  }

  // 题目
  if(q.type==='C'){
    // 自测模式
    const correctOpts=q.wordObj.options.filter(o=>o.correct);
    html+=`<span class="self-test-word">${q.wordObj.word}</span>`;
    html+=`<span class="self-test-pos">${q.wordObj.pos}</span>`;
    html+='<div class="self-test-hint">👁 点击下方色块，揭开中文含义</div>';
    html+=`<div class="reveal-mask" id="mask${qidx}" onclick="revealMeaning(${qidx})">`;
    html+='<div class="mask-cover" id="maskCover'+qidx+'">▋▋▋ 点击揭开 ▋▋▋</div>';
    html+='<div class="meaning-content" id="meaningContent'+qidx+'">';
    correctOpts.forEach((opt,i)=>{
      html+=`<div class="meaning-item"><span class="m-label">${i+1}.</span>${opt.text}</div>`;
    });
    if(q.wordObj.sentence){
      html+=`<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-style:italic;font-size:0.88rem;color:var(--text-dim);line-height:1.7">${q.wordObj.sentence}</div>`;
    }
    html+='</div></div>';
    html+='<div class="self-judge-btns" id="selfJudge'+qidx+'">';
    html+=`<button class="btn-correct-self" id="selfCorrect${qidx}" onclick="selfJudge(${qidx},true)">答对了</button>`;
    html+=`<button class="btn-wrong-self" id="selfWrong${qidx}" onclick="selfJudge(${qidx},false)">答错了</button>`;
    html+='</div>';
  } else if(q.type==='A'){
    html+=`<span class="q-word">${q.wordObj.word}</span>`;
    html+=`<span class="q-pos">${q.wordObj.pos}</span>`;
    html+='<div class="q-prompt">这个单词的含义是？</div>';
  } else {
    const hl=q.wordObj.sentence.replace(
      new RegExp('\\b'+q.wordObj.word+'\\b','i'),
      m=>`<span class="hl">${m}</span>`
    );
    html+=`<div class="q-sentence">${hl}</div>`;
    html+='<div class="q-prompt">句中高亮单词的含义是？</div>';
  }

  if(q.type!=='C'){
    // 选项
    html+='<div class="options">';
    q.opts.forEach((opt,i)=>{
      html+=`<button class="option-btn" data-idx="${i}" onclick="selectOption(this,${qidx},${i})">`;
      html+=`<span class="opt-label">${labels[i]}</span>${opt.text}</button>`;
    });
    html+='</div>';

    // 多选提交
    if(q.isMulti){
      html+=`<button class="submit-multi" id="submitBtn${qidx}" onclick="submitMulti(${qidx})">确认提交</button>`;
    }
  }

  // 结果区
  html+=`<div class="q-result" id="result${qidx}"><span class="msg"></span><span class="score-delta"></span></div>`;

  card.innerHTML=html;
}

// =================================================================
// 自测模式交互
// =================================================================
function revealMeaning(qidx){
  const q=currentQs[qidx];
  if(q.answered)return;
  const cover=document.getElementById('maskCover'+qidx);
  const content=document.getElementById('meaningContent'+qidx);
  if(!cover||content.classList.contains('visible'))return;
  cover.classList.add('hidden');
  content.classList.add('visible');
  // 揭开后显示自判按钮
  const btns=document.getElementById('selfJudge'+qidx);
  if(btns){
    btns.querySelectorAll('button').forEach(b=>b.classList.add('active'));
  }
}

function selfJudge(qidx,isCorrect){
  const q=currentQs[qidx];
  if(q.answered)return;
  // 确保已揭开
  revealMeaning(qidx);
  q.answered=true;
  const btns=document.getElementById('selfJudge'+qidx);
  if(btns) btns.querySelectorAll('button').forEach(b=>{b.disabled=true;b.style.opacity='0.45';});

  let isCrit=false,delta;
  if(isCorrect){
    combo++;
    if(combo>bestCombo){bestCombo=combo;LS.set('bestCombo',bestCombo);}
    const mult=Math.min(combo,4);
    delta=10*mult;
    isCrit=Math.random()<0.15;
    if(isCrit)delta*=2;
    score+=delta;
    todayData.correct++;
    LS.set('score_'+todayKey,score);
    if(isCrit){soundCrit();showCritLabel();flash('crit-flash');}
    else{soundCorrect();flash('correct-flash');}
    if(combo>=2)soundComboUp();
    document.getElementById('qcard'+qidx).classList.add('answered-correct');
  } else {
    const penalty=5*Math.min(Math.max(combo,1),4);
    delta=-penalty;
    score=Math.max(0,score+delta);
    combo=0;
    LS.set('score_'+todayKey,score);
    soundWrong();flash('wrong-flash');
    const card=document.getElementById('qcard'+qidx);
    card.classList.add('answered-wrong','shake');
    setTimeout(()=>card.classList.remove('shake'),500);
  }
  todayData.total++;
  LS.set('today_'+todayKey,todayData);

  const resultEl=document.getElementById('result'+qidx);
  resultEl.classList.add('show',isCorrect?'correct-fb':'wrong-fb');
  resultEl.querySelector('.msg').textContent=isCorrect
    ?(isCrit?'🎰 暴击！自测正确！':'✓ 自测正确！')+(combo>=2?' COMBO ×'+combo:'')
    :'✗ 自测错误，继续加油';
  resultEl.querySelector('.score-delta').textContent=(delta>0?'+':'')+delta;
  showScorePopup(delta,isCrit);
  showCombo();
  updateUI();

  answeredCount++;
  if(answeredCount>=totalQs){
    setTimeout(()=>document.getElementById('spinBtn').disabled=false,600);
  }
}

// =================================================================
// 答题交互
// =================================================================
function selectOption(btn,qidx,optIdx){
  const q=currentQs[qidx];
  if(q.answered)return;
  if(!q.isMulti){
    btn.closest('.options').querySelectorAll('.option-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    judgeQuestion(qidx,[optIdx]);
  } else {
    btn.classList.toggle('selected');
  }
}

function submitMulti(qidx){
  const q=currentQs[qidx];
  if(q.answered)return;
  const card=document.getElementById('qcard'+qidx);
  const selected=[...card.querySelectorAll('.option-btn.selected')].map(b=>parseInt(b.dataset.idx));
  if(selected.length===0){alert('请至少选择一项');return;}
  judgeQuestion(qidx,selected);
}

function judgeQuestion(qidx,selectedIdxs){
  const q=currentQs[qidx];
  q.answered=true;
  const card=document.getElementById('qcard'+qidx);
  const btns=card.querySelectorAll('.option-btn');
  const submitBtn=document.getElementById('submitBtn'+qidx);
  if(submitBtn)submitBtn.disabled=true;
  btns.forEach(b=>b.disabled=true);

  // 判断正误
  const correctIdxs=q.opts.map((o,i)=>o.correct?i:-1).filter(i=>i>=0);
  const selectedSet=new Set(selectedIdxs);
  const correctSet=new Set(correctIdxs);
  const isCorrect=selectedSet.size===correctSet.size&&[...correctSet].every(i=>selectedSet.has(i));

  // 标色
  btns.forEach((b,i)=>{
    if(correctSet.has(i))b.classList.add('correct');
    else if(selectedSet.has(i))b.classList.add('wrong');
  });

  // 积分
  let isCrit=false,delta;
  if(isCorrect){
    combo++;
    if(combo>bestCombo){bestCombo=combo;LS.set('bestCombo',bestCombo);}
    const mult=Math.min(combo,4);
    delta=10*mult;
    isCrit=Math.random()<0.15;
    if(isCrit)delta*=2;
    score+=delta;
    todayData.correct++;
    LS.set('score_'+todayKey,score);
    if(isCrit){soundCrit();showCritLabel();flash('crit-flash');}
    else{soundCorrect();flash('correct-flash');}
    if(combo>=2)soundComboUp();
    card.classList.add('answered-correct');
  } else {
    const penalty=5*Math.min(Math.max(combo,1),4);
    delta=-penalty;
    score=Math.max(0,score+delta);
    combo=0;
    LS.set('score_'+todayKey,score);
    soundWrong();flash('wrong-flash');
    card.classList.add('answered-wrong');
    card.classList.add('shake');
    setTimeout(()=>card.classList.remove('shake'),500);
  }
  todayData.total++;
  LS.set('today_'+todayKey,todayData);

  // 显示反馈
  const resultEl=document.getElementById('result'+qidx);
  resultEl.classList.add('show',isCorrect?'correct-fb':'wrong-fb');
  resultEl.querySelector('.msg').textContent=isCorrect
    ?(isCrit?'🎰 暴击！完全正确！':'✓ 正确！')+(combo>=2?' COMBO ×'+combo:'')
    :'✗ 错误，正确选项已标绿';
  resultEl.querySelector('.score-delta').textContent=(delta>0?'+':'')+delta;
  showScorePopup(delta,isCrit);
  showCombo();
  updateUI();

  answeredCount++;
  if(answeredCount>=totalQs){
    setTimeout(()=>document.getElementById('spinBtn').disabled=false,600);
  }
}

// SPIN

function spin(){
  if(spinning)return;
  if(WORD_BANK.length<3){alert('单词库至少需要3个单词！');return;}
  spinning=true;
  answeredCount=0;
  document.getElementById('spinBtn').disabled=true;
  document.getElementById('questionsArea').innerHTML='';
  soundReelStart();

  const picked=shuffle(WORD_BANK).slice(0,3);
  currentQs=picked.map(w=>buildQuestion(w));
  totalQs=currentQs.length;

  picked.forEach((word,i)=>{
    const reel=document.getElementById('reel'+i);
    buildReel(reel,WORD_BANK,word);
    spinReel(reel,1200+(i*600),i===2?()=>showQuestions():null);
  });
}

function showQuestions(){
  spinning=false;
  const area=document.getElementById('questionsArea');
  currentQs.forEach((q,i)=>{
    const card=document.createElement('div');
    card.className='q-card';
    card.id='qcard'+i;
    card.dataset.qidx=i;
    area.appendChild(card);
    renderQuestion(q,i);
  });
  setTimeout(()=>area.scrollIntoView({behavior:'smooth',block:'start'}),400);
}

// =================================================================
// 初始化
// =================================================================
(function init(){
  [0,1,2].forEach(i=>{
    const reel=document.getElementById('reel'+i);
    const w=WORD_BANK[i%WORD_BANK.length];
    buildReel(reel,WORD_BANK,w);
    reel.style.transform='translateY(-264px)';
  });
  updateUI();
})();
</script>
</body>
</html>
